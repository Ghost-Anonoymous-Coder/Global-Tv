
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gargoyle TV</title>
    <style>
        body {
            display: flex;
            flex-direction: column; /* Change to row to align items side by side */
            align-items: flex-start; /* Align items at the start */
            justify-content: center; /* Center horizontally */
            height: 90vh;
            margin: 0;
            background: linear-gradient(135deg, rgba(0, 0, 65, 0.8), rgba(80, 65, 80, 0.8));
            font-family: 'Arial', sans-serif;
            color: white;
        }
        h1 {
            color: #ff6347;
            font-size: 35px;
            margin-bottom: 20px; /* Reduce margin for better layout */
            text-shadow: 2px 4px 8px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%; /* Make sure header spans full width */
        }
        .button {
            border: none;
            color: white;
            padding: 15px 30px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 20px;
            margin: 10px 5px;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }
        .button1 { background: rgba(255, 99, 71, 0.8); }
        .button2 { background: rgba(50, 168, 82, 0.8); }
        .button3 { background: rgba(30, 144, 255, 0.8); }
        .button4 { background: rgba(255, 215, 0, 0.8); }
        .button5 { background: rgba(255, 20, 147, 0.8); }
        .button6 { background: rgba(75, 0, 130, 0.8); }
        .button7 { background: rgba(238, 130, 238, 0.8); }
        .button8 { background: rgba(255, 182, 193, 0.8); }
        .button9 { background: rgba(0, 204, 204, 0.8); }
        .button10 { background: rgba(255, 69, 0, 0.8); }
        .button:hover {
            transform: scale(1.05);
        }
        .container {
            display: flex;
            flex-direction: column; /* Align video and channels side by side */
            width: 98%; /* Define the width for the container */
            border: 2px solid rgba(255, 0, 0, 0.5); /* Optional styling */
            border-radius: 5px; /* Optional styling */
            overflow: show; /* Optional styling */
        }
        video {
            width: 95%; /* Set width for the video player */
            margin: 9px; /* Margins around the video */
            display: solid; /* Hidden by default */
        }
        .channelList {
            width: 95%; /* Set width for the channel list */
            margin: 0px; /* Margins around the list */
            overflow-y: auto; /* Enable scrolling if the list is long */
            max-height: 54vh; /* Set maximum height to prevent overflow */
            background: rgba(0, 0, 0, 0.7); /* Background for channel list */
            padding: 10px; /* Padding inside the list */
            border-radius: 10px; /* Rounded corners */
        }
        .channelItem {
            padding: 8px;
            cursor: pointer; /* Change cursor on hover */
            transition: background 0.3s; /* Transition effect */
        }
        .channelItem:hover {
            background: rgba(255, 65, 255, 0.2); /* Highlight on hover */
        }
    </style>
</head>
<body>
    <h1>Gargoyle TV ™</h1>
    <div class="container">
        <video id="videoPlayer" controls>
            <source id="videoSource" src="" type="application/x-mpegURL">
            Your browser does not support the video tag.
        </video>
        <div class="channelList" id="channelList">
            <!-- Channel items will be added here dynamically -->
        </div>
    </div>

    <script>
        async function fetchChannels() {
            try {
                const response = await fetch('https://iptv-org.github.io/iptv/languages/eng.m3u');
                const data = await response.text();
                const lines = data.split('\n');
                const channels = [];

                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF:')) {
                        const channelName = lines[i].substring(lines[i].indexOf(',') + 1).trim();
                        const channelUrl = lines[i + 1].trim();
                        channels.push({ name: channelName, url: channelUrl });
                    }
                }

                // Populate the channel list
                const channelListElement = document.getElementById('channelList');
                channels.forEach(channel => {
                    const channelItem = document.createElement('div');
                    channelItem.className = 'channelItem';
                    channelItem.innerText = channel.name;
                    channelItem.onclick = () => {
                        const videoPlayer = document.getElementById('videoPlayer');
                        const videoSource = document.getElementById('videoSource');
                        videoSource.src = channel.url;
                        videoPlayer.load();
                        videoPlayer.style.display = 'block'; // Show the video player
                    };
                    channelListElement.appendChild(channelItem);
                });
            } catch (error) {
                console.error('Error fetching channels:', error);
            }
        }

        window.onload = fetchChannels; // Fetch channels when the page loads
    </script>
</body>
</html>
